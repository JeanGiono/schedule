<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北歐奶茶風 - 互動式分層施工圖 (插座升級版)</title>
    <style>
        :root {
            /* 空間與材質色彩 */
            --bg-color: #fcfbf9;
            --wall-color: #5c5046;
            --wet-wall: #8c7f75;
            --floor-wood: #f8f4ef;
            --floor-tile: #f0ebe4;
            
            /* 家具與櫃體色彩 */
            --furn-wood: #e3d1be;
            --furn-wood-dark: #ccb7a1;
            --furn-sofa: #dfd5c9; 
            --furn-bed: #fdfcf9;
            --furn-wardrobe: #d9cabd;
            --tv-screen: #222222;
            --tv-frame: #111111;

            /* 機電 MEP 色彩 */
            --mep-beam: #f1c40f;
            --mep-ac: #3498db;
            --mep-fresh: #27ae60;
            --pipe-cold: #0984e3;
            --pipe-hot: #d63031;
            --pipe-drain: #00b894;
            --pipe-acd: #00cec9;

            /* ⚡ 弱電與插座色彩 */
            --elec-socket: #e74c3c;    
            --elec-switch: #f39c12;    
            --elec-network: #8e44ad;   
            --elec-water: #00cec9;     
            --elec-panel: #c0392b;     

            /* 天花板色彩 */
            --ceil-28: #ffffff;
            --ceil-26: #d8c8b8;
            --ceil-24: #e3dcd5;
            
            /* UI 顏色 */
            --primary: #8c7f75;
            --primary-hover: #706359;
            --text-main: #332b24;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #e5dfd8;
            font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: 26px;
            letter-spacing: 2px;
        }

        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 1200px;
        }

        .tab-btn {
            background-color: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover { background-color: #f4ede6; }
        .tab-btn.active {
            background-color: var(--primary);
            color: #fff;
            box-shadow: 0 4px 10px rgba(140, 127, 117, 0.4);
        }
        
        .tab-btn[data-layer="electrical"] { border-color: #e74c3c; color: #e74c3c; }
        .tab-btn[data-layer="electrical"].active { background-color: #e74c3c; color: #fff; }

        .legend-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            max-width: 1200px;
            min-height: 24px;
            transition: opacity 0.3s ease;
        }

        .legend-item { display: flex; align-items: center; font-size: 13px; font-weight: 600; color: #444; }
        .legend-box { width: 18px; height: 18px; margin-right: 8px; border-radius: 3px; border: 1px solid #ddd; }
        .legend-line { width: 24px; height: 4px; margin-right: 8px; }
        .legend-icon { width: 20px; height: 20px; margin-right: 8px; display: flex; justify-content: center; align-items: center; }

        .canvas-container {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(180, 170, 160, 0.15);
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
            overflow-x: auto;
        }

        svg { width: 100%; height: auto; display: block; }

        /* ================= 專業藍圖純淨標示樣式 ================= */
        .dim-text { font-size: 15px; font-weight: bold; fill: #a39486; text-anchor: middle; dominant-baseline: middle; }
        
        .leader-line {
            fill: none;
            stroke: #b0a092;
            stroke-width: 1.2;
            stroke-dasharray: 4, 4;
            opacity: 0.85;
        }

        /* 拔除 text-shadow 白邊，維持文字純粹乾淨 */
        .label-text {
            font-size: 13px;
            font-weight: bold;
            dominant-baseline: middle;
        }
        
        g[id^="layer-"] { transition: opacity 0.4s ease; }

        /* "綜合全圖" 的透明度處理 */
        .mode-all #layer-ceiling .ceil-zone { fill-opacity: 0.1; stroke-opacity: 0.2; }
        .mode-all #layer-mep .pipe-line { opacity: 0.25; }
        .mode-all #layer-furniture { opacity: 0.65; }
    </style>
</head>
<body>

    <div class="header">
        <h1>北歐奶茶風 互動式分層施工圖</h1>
        <p>升級配置：已納入沙發/餐桌雙側插座與智慧窗簾電源，保證100%零重疊</p>
    </div>

    <!-- Tabs -->
    <div class="tabs-container" id="tabs">
        <button class="tab-btn active" data-layer="all">綜合全圖</button>
        <button class="tab-btn" data-layer="masonry">① 泥作與結構</button>
        <button class="tab-btn" data-layer="mep">② 水電空調</button>
        <button class="tab-btn" data-layer="ceiling">③ 天花板照明</button>
        <button class="tab-btn" data-layer="cabinetry">④ 系統櫃與電視</button>
        <button class="tab-btn" data-layer="furniture">⑤ 軟裝家具</button>
        <button class="tab-btn" data-layer="electrical">⑥ 插座與弱電 ⚡</button>
    </div>

    <div class="legend-container" id="legend"></div>

    <div class="canvas-container">
        <!-- 畫布四面極限擴張，設立專屬文字停放軌道 -->
        <svg viewBox="-200 -250 1600 950" xmlns="http://www.w3.org/2000/svg" id="master-svg" class="mode-all">
            
            <defs>
                <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto"><path d="M9,0 L0,3 L9,6 z" fill="#b0a092" /></marker>
                <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 z" fill="#b0a092" /></marker>
                <marker id="arrow-drain" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="var(--pipe-drain)" /></marker>

                <pattern id="wood-floor" width="40" height="120" patternUnits="userSpaceOnUse">
                    <rect width="40" height="120" fill="var(--floor-wood)"/>
                    <line x1="0" y1="0" x2="0" y2="120" stroke="#ede5db" stroke-width="1"/>
                    <line x1="0" y1="60" x2="40" y2="60" stroke="#ede5db" stroke-width="1"/>
                </pattern>
                <pattern id="tile-floor" width="40" height="40" patternUnits="userSpaceOnUse">
                    <rect width="40" height="40" fill="var(--floor-tile)"/>
                    <rect width="40" height="40" fill="none" stroke="#e0d7cd" stroke-width="1"/>
                </pattern>
                <pattern id="concrete-pattern" width="10" height="10" patternUnits="userSpaceOnUse">
                    <rect width="10" height="10" fill="var(--wet-wall)" />
                    <circle cx="3" cy="3" r="1" fill="#a09388" />
                </pattern>
                <linearGradient id="tv-glare" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#2a2a2a;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#222;stop-opacity:1" />
                </linearGradient>

                <g id="sym-recessed"><circle cx="0" cy="0" r="8" fill="#fff" stroke="#e67e22" stroke-width="2"/><circle cx="0" cy="0" r="4" fill="#e67e22"/></g>
                <g id="sym-ceiling"><circle cx="0" cy="0" r="25" fill="rgba(52, 152, 219, 0.1)" stroke="#3498db" stroke-width="2"/><circle cx="0" cy="0" r="4" fill="#3498db"/></g>
                
                <g id="sym-socket"><rect x="-6" y="-6" width="12" height="12" rx="2" fill="var(--elec-socket)" stroke="#fff" stroke-width="1"/><line x1="-2" y1="-2" x2="-2" y2="2" stroke="#fff" stroke-width="1.5" /><line x1="2" y1="-2" x2="2" y2="2" stroke="#fff" stroke-width="1.5" /></g>
                <g id="sym-switch"><circle cx="0" cy="0" r="7" fill="var(--elec-switch)" stroke="#fff" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="#fff"/></g>
                <g id="sym-network"><polygon points="0,-7 7,5 -7,5" fill="var(--elec-network)" stroke="#fff" stroke-width="1"/></g>
                <g id="sym-water"><path d="M0,-6 Q5,0 5,4 A5,5 0 0 1 -5,4 Q-5,0 0,-6 Z" fill="var(--elec-water)" stroke="#fff" stroke-width="1"/></g>
                <g id="sym-camera"><rect x="-7" y="-5" width="14" height="10" rx="2" fill="var(--elec-network)" stroke="#fff" stroke-width="1"/><circle cx="0" cy="0" r="3" fill="#fff" /></g>
                <g id="sym-panel"><rect x="-8" y="-12" width="16" height="24" fill="#fff" stroke="var(--elec-panel)" stroke-width="2" rx="1"/><line x1="-8" y1="-12" x2="8" y2="12" stroke="var(--elec-panel)" stroke-width="1.5"/><line x1="8" y1="-12" x2="-8" y2="12" stroke="var(--elec-panel)" stroke-width="1.5"/></g>
            </defs>

            <!-- ================= 固定底層 (Base Layer) ================= -->
            <g id="layer-base">
                <polygon points="0,40 40,0 94,0 94,400 40,400 0,360" fill="#d1cfcb" />
                <rect x="94" y="0" width="786" height="400" fill="url(#wood-floor)" />
                <rect x="880" y="0" width="230" height="400" fill="url(#tile-floor)" />

                <g stroke="#b0a092" stroke-width="2">
                    <line x1="94" y1="-40" x2="394" y2="-40" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
                    <text x="244" y="-50" class="dim-text" stroke="none">3m</text>
                    <line x1="394" y1="-40" x2="880" y2="-40" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
                    <text x="637" y="-50" class="dim-text" stroke="none">4.86m</text>
                    <line x1="880" y1="-40" x2="1110" y2="-40" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
                    <text x="995" y="-50" class="dim-text" stroke="none">2.3m</text>
                    <line x1="94" y1="-50" x2="94" y2="0" stroke-width="1"/><line x1="394" y1="-50" x2="394" y2="0" stroke-width="1"/><line x1="880" y1="-50" x2="880" y2="0" stroke-width="1"/><line x1="1110" y1="-50" x2="1110" y2="0" stroke-width="1"/>

                    <line x1="94" y1="440" x2="1110" y2="440" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
                    <text x="602" y="430" class="dim-text" stroke="none">室內總長 10.16m</text>
                    <line x1="94" y1="400" x2="94" y2="450" stroke-width="1"/><line x1="1110" y1="400" x2="1110" y2="450" stroke-width="1"/>
                </g>
            </g>

            <!-- ================= ① 泥作與結構層 ================= -->
            <g id="layer-masonry">
                <g fill="var(--wall-color)">
                    <rect x="90" y="0" width="4" height="400" />
                    <line x1="394" y1="0" x2="394" y2="400" stroke="var(--wall-color)" stroke-width="3" stroke-dasharray="10,10" />
                    <rect x="878" y="0" width="4" height="80" /> 
                    <rect x="878" y="150" width="4" height="250" />
                    <rect x="94" y="-4" width="1020" height="4" />
                    <rect x="94" y="400" width="926" height="4" />
                    <rect x="1110" y="0" width="4" height="310" />
                </g>
                <rect x="882" y="150" width="228" height="15" fill="url(#concrete-pattern)" stroke="var(--wall-color)" stroke-width="1.5" />
                <rect x="1030" y="0" width="80" height="150" fill="rgba(240, 243, 245, 0.5)" />
                <rect x="1024" y="0" width="12" height="100" fill="#f0ebe4" stroke="#c4bdb6" stroke-width="2" rx="2" />
                <g fill="none" stroke="#bea99a" stroke-width="2">
                    <path d="M 880 80 A 70 70 0 0 1 950 150" stroke-dasharray="5,5" />
                    <line x1="880" y1="150" x2="950" y2="150" stroke-width="4" stroke-linecap="round" />
                    <path d="M 1020 400 A 90 90 0 0 1 1110 310" stroke-dasharray="5,5" />
                    <line x1="1110" y1="400" x2="1110" y2="310" stroke-width="4" stroke-linecap="round" />
                </g>

                <!-- 泥作文字標示 -->
                <polyline points="996,157 1130,120 1150,120" class="leader-line"/>
                <text x="1160" y="120" class="label-text" fill="#5c5046" text-anchor="start">15cm 共用水牆</text>

                <polyline points="1030,50 1130,50 1150,50" class="leader-line"/>
                <text x="1160" y="50" class="label-text" fill="#5c5046" text-anchor="start">半高矮牆</text>
            </g>

            <!-- ================= ② 水電與空調層 ================= -->
            <g id="layer-mep">
                <rect x="1060" y="0" width="50" height="40" fill="#636e72" />
                
                <!-- 管道標示 -->
                <polyline points="1085,20 1130,15 1150,15" class="leader-line"/>
                <text x="1160" y="15" class="label-text" fill="#636e72" text-anchor="start">大樓管道間</text>

                <g class="pipe-line">
                    <path d="M 905 30 L 1060 30" stroke="var(--pipe-drain)" stroke-width="5" fill="none" marker-end="url(#arrow-drain)" />
                    <path d="M 920 180 L 1080 180 L 1080 40" stroke="var(--pipe-drain)" stroke-width="4" fill="none" marker-end="url(#arrow-drain)" />
                    <path d="M 50 25 L 910 25 L 910 180" stroke="var(--pipe-hot)" stroke-width="2" fill="none" stroke-linejoin="round" />
                    <path d="M 1000 15 L 50 15" stroke="var(--pipe-cold)" stroke-width="2" fill="none" stroke-linejoin="round" />
                    <path d="M 445 50 L 445 35 L 920 35 L 920 180" stroke="var(--pipe-acd)" stroke-width="3" stroke-dasharray="6,4" fill="none" />
                </g>
                <rect x="15" y="190" width="60" height="70" fill="rgba(52, 152, 219, 0.2)" stroke="var(--mep-ac)" stroke-width="2" stroke-dasharray="4,2" rx="3" />
                <rect x="180" y="0" width="90" height="20" fill="rgba(52, 152, 219, 0.4)" stroke="var(--mep-ac)" stroke-width="2" rx="2" />
                <rect x="364" y="50" width="20" height="100" fill="rgba(52, 152, 219, 0.4)" stroke="var(--mep-ac)" stroke-width="2" rx="2" />
                <rect x="15" y="20" width="60" height="40" fill="rgba(39, 174, 96, 0.2)" stroke="var(--mep-fresh)" stroke-width="2" stroke-dasharray="4,2" rx="3" />
                <path d="M 75 40 L 400 40 L 400 150" stroke="var(--mep-fresh)" stroke-width="5" fill="none" opacity="0.6" />

                <!-- 空調文字標示 -->
                <!-- 右側軌道 -->
                <!-- 左側軌道 -->
                <polyline points="15,225 -20,225" class="leader-line"/>
                <text x="-30" y="225" class="label-text" fill="var(--mep-ac)" text-anchor="end">疊放室外機</text>
                <polyline points="45,20 45,-60 -20,-60" class="leader-line"/>
                <text x="-30" y="-60" class="label-text" fill="var(--mep-fresh)" text-anchor="end">正壓新風主機</text>

                <!-- 上方軌道 (確保線不穿透字體，Y線條停在字體下方 10px 處) -->
                <polyline points="230,10 230,-90 230,-90" class="leader-line"/>
                <text x="230" y="-100" class="label-text" fill="var(--mep-ac)" text-anchor="middle">主臥冷氣</text>

                <polyline points="410,50 410,-100 410,-100" class="leader-line"/>
                <text x="410" y="-110" class="label-text" fill="var(--mep-ac)" text-anchor="middle">客廳冷氣</text>
            </g>

            <!-- ================= ③ 天花板與照明層 ================= -->
            <g id="layer-ceiling">
                <rect x="94" y="0" width="786" height="400" fill="var(--ceil-28)" stroke="#e0e0e0" stroke-width="1" class="ceil-zone" opacity="0.8"/>
                <rect x="880" y="0" width="230" height="400" fill="url(#hatch-24)" stroke="#b8b0a6" stroke-width="2" class="ceil-zone" opacity="0.8"/>
                <rect x="94" y="0" width="786" height="50" fill="var(--ceil-26)" stroke="#cbbab5" stroke-width="2" class="ceil-zone" opacity="0.9"/>
                <rect x="364" y="50" width="60" height="100" fill="var(--ceil-26)" stroke="#cbbab5" stroke-width="2" class="ceil-zone" opacity="0.9"/>
                
                <use href="#sym-ceiling" x="244" y="210" />
                <use href="#sym-ceiling" x="517" y="205" />
                <use href="#sym-recessed" x="930" y="40" /> <use href="#sym-recessed" x="990" y="40" />
                <use href="#sym-recessed" x="980" y="200" /> <use href="#sym-recessed" x="1050" y="200" />
                <use href="#sym-recessed" x="980" y="280" /> <use href="#sym-recessed" x="1050" y="280" />
                <path d="M 94 55 L 360 55 L 360 155" fill="none" stroke="#f1c40f" stroke-width="4" stroke-dasharray="6,4" />
                <path d="M 428 55 L 880 55" fill="none" stroke="#f1c40f" stroke-width="4" stroke-dasharray="6,4" />

                <!-- 天花板文字標示 -->
                <polyline points="995,200 1130,190 1150,190" class="leader-line"/>
                <text x="1160" y="190" class="label-text" fill="#8c7f75" text-anchor="start">H=2.4m 平釘區</text>
                
                <!-- 上方軌道停點 -->
                <polyline points="420,25 420,-150 500,-150" class="leader-line"/>
                <text x="500" y="-160" class="label-text" fill="#8c7f75" text-anchor="middle">H=2.6m 局部包管假樑</text>
            </g>

            <!-- ================= ④ 系統櫃與設備層 ================= -->
            <g id="layer-cabinetry">
                <rect x="890" y="0" width="30" height="15" fill="#fff" stroke="#ccc" rx="3" />
                <ellipse cx="905" cy="30" rx="15" ry="22" fill="#fff" stroke="#ccc" />
                <rect x="940" y="0" width="70" height="50" fill="#fcfaf7" stroke="#ccc"/>
                <ellipse cx="975" cy="25" rx="20" ry="12" fill="#fff" stroke="#ccc" />
                <circle cx="1070" cy="75" r="12" stroke="#bbb" fill="none" />
                
                <rect x="940" y="165" width="170" height="60" fill="var(--furn-kitchen)" />
                <rect x="950" y="170" width="70" height="50" fill="#f5f2ed" rx="3" />
                <rect x="1040" y="170" width="60" height="50" fill="#fcfaf7" rx="2" />
                <circle cx="1055" cy="195" r="10" fill="none" stroke="#aaa" stroke-width="2" />
                <circle cx="1085" cy="195" r="10" fill="none" stroke="#aaa" stroke-width="2" />

                <rect x="154" y="0" width="160" height="45" fill="var(--furn-wood-dark)" />
                <rect x="94" y="330" width="290" height="70" fill="var(--furn-wardrobe)" />
                
                <rect x="410" y="0" width="210" height="30" fill="var(--furn-wood-dark)" />
                <rect x="445" y="360" width="180" height="40" fill="var(--furn-wood)" />
                <line x1="505" y1="360" x2="505" y2="400" stroke="#bda38b" stroke-width="1" />
                <line x1="565" y1="360" x2="565" y2="400" stroke="#bda38b" stroke-width="1" />

                <!-- TV S90F -->
                <g transform="translate(462.5, 277)">
                    <rect x="50" y="80" width="45" height="3" fill="#333" />
                    <rect x="0" y="0" width="145" height="83" fill="var(--tv-screen)" stroke="var(--tv-frame)" stroke-width="1" rx="1" />
                    <rect x="1" y="1" width="143" height="81" fill="url(#tv-glare)" rx="0.5" />
                </g>

                <rect x="400" y="360" width="45" height="40" fill="var(--furn-wood)" />
                <rect x="880" y="360" width="70" height="40" fill="var(--furn-wood-dark)" />
                <rect x="950" y="360" width="70" height="40" fill="var(--furn-wood)" />

                <!-- 櫃體文字標示 -->
                <!-- 上方軌道 -->
                <polyline points="540,15 540,-110 560,-110" class="leader-line"/>
                <text x="560" y="-120" class="label-text" fill="#5c5046" text-anchor="middle">沙發背櫃</text>

                <!-- 下方軌道 -->
                <polyline points="200,45 200,470" class="leader-line"/>
                <text x="200" y="480" class="label-text" fill="#5c5046" text-anchor="middle">床頭上櫃</text>
                
                <polyline points="280,365 280,590 200,590" class="leader-line"/>
                <text x="200" y="600" class="label-text" fill="#5c5046" text-anchor="middle">系統大衣櫃</text>

                <polyline points="422,380 422,470" class="leader-line"/>
                <text x="422" y="480" class="label-text" fill="#5c5046" text-anchor="middle">書櫃</text>

                <polyline points="535,380 535,470" class="leader-line"/>
                <text x="535" y="480" class="label-text" fill="#5c5046" text-anchor="middle">電視長櫃</text>
                
                <polyline points="535,277 600,380 600,510" class="leader-line"/>
                <text x="600" y="520" class="label-text" fill="#5c5046" text-anchor="middle">65" OLED (S90F)</text>

                <polyline points="915,380 915,470" class="leader-line"/>

        const legends = {

            `,
            mep: `
                <div class="legend-item"><div class="legend-line" style="background: var(--pipe-cold);"></div>冷水管</div>
                <div class="legend-item"><div class="legend-line" style="background: var(--pipe-hot);"></div>熱水管</div>
                <div class="legend-item"><div class="legend-line" style="background: var(--pipe-drain);"></div>廢水/糞管</div>
                <div class="legend-item"><div class="legend-box" style="border: 2px dashed var(--mep-ac);"></div>冷氣設備</div>
                <div class="legend-item"><div class="legend-box" style="border: 2px dashed var(--mep-fresh);"></div>正壓新風主機</div>
            `,
            ceiling: `
                <div class="legend-item"><div class="legend-box" style="background: var(--ceil-28);"></div>H=2.8m (保留最高屋頂)</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--ceil-26);"></div>H=2.6m (木作假樑包管)</div>

                <div class="legend-item"><svg class="legend-icon"><circle cx="10" cy="10" r="5" fill="#e67e22"/></svg> 嵌燈</div>
            `,
            cabinetry: `
                <div class="legend-item"><div class="legend-box" style="background: var(--furn-wood-dark);"></div>系統櫃/木作櫃體</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--furn-wardrobe);"></div>系統大衣櫃</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--furn-kitchen);"></div>廚房設備</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--tv-screen); border: 1px solid var(--tv-frame);"></div>OLED 電視</div>
            `,
            furniture: `
                <div class="legend-item"><div class="legend-box" style="background: var(--furn-sofa);"></div>新款燕麥米色沙發床</div>
                <div class="legend-item"><div class="legend-box" style="background: var(--furn-bed);"></div>床墊寢具</div>
                <div class="legend-item"><div class="legend-box" style="background: #f0e2d1;"></div>活動式家具 (折疊桌/茶几)</div>
                <div class="legend-item"><div class="legend-box" style="background: #bdc3c7;"></div>LG 金屬銀冰箱</div>
            `,
            electrical: `
                <div class="legend-item"><svg class="legend-icon"><rect x="4" y="4" width="12" height="12" rx="2" fill="#e74c3c"/></svg> 110V/220V 插座</div>
                <div class="legend-item"><svg class="legend-icon"><circle cx="10" cy="10" r="7" fill="#f39c12"/></svg> 燈具開關 / 一鍵斷電</div>
                <div class="legend-item"><svg class="legend-icon"><polygon points="10,3 17,15 3,15" fill="#8e44ad"/></svg> 網路孔 (RJ45)</div>
                <div class="legend-item"><svg class="legend-icon"><rect x="3" y="5" width="14" height="10" rx="2" fill="#8e44ad"/></svg> PoE 監視器</div>
                <div class="legend-item"><svg class="legend-icon"><path d="M10,4 Q15,10 15,14 A5,5 0 0 1 5,14 Q5,10 10,4 Z" fill="#00cec9"/></svg> 濾水器專用</div>
                <div class="legend-item"><svg class="legend-icon"><rect x="4" y="2" width="12" height="16" fill="#fff" stroke="#c0392b" stroke-width="2"/><line x1="4" y1="2" x2="16" y2="18" stroke="#c0392b" stroke-width="1.5"/></svg> 總電箱 (配電盤)</div>
            `,
            all: `
                <div class="legend-item"><div class="legend-box" style="background: url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'10\\' height=\\'10\\'><rect width=\\'10\\' height=\\'10\\' fill=\\'%238c7f75\\' /><circle cx=\\'3\\' cy=\\'3\\' r=\\'1\\' fill=\\'%23a09388\\' /></svg>');"></div>15cm 共用水牆</div>
                <div class="legend-item"><div class="legend-box" style="background: rgba(241, 196, 15, 0.3); border: 1px dashed #d35400;"></div>H=2.6m 天花板假樑</div>
                <div class="legend-item"><svg class="legend-icon"><rect x="4" y="2" width="12" height="16" fill="#fff" stroke="#c0392b" stroke-width="2"/><line x1="4" y1="2" x2="16" y2="18" stroke="#c0392b" stroke-width="1.5"/></svg> 總電箱 (配電盤)</div>
                <div class="legend-item"><svg class="legend-icon"><line x1="2" y1="10" x2="18" y2="10" stroke="#a39486" stroke-width="1.5" stroke-dasharray="4,4"/></svg> 全區軌道化指引線 (保證無重疊)</div>
            `
        };

        const layers = ['masonry', 'mep', 'ceiling', 'cabinetry', 'furniture', 'electrical'];
        const svgElement = document.getElementById('master-svg');
        const legendContainer = document.getElementById('legend');

        updateLegend('all');

        document.getElementById('tabs').addEventListener('click', function(e) {
            if(e.target.classList.contains('tab-btn')) {
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');

                const selectedLayer = e.target.getAttribute('data-layer');

                if(selectedLayer === 'all') {
                    svgElement.classList.add('mode-all');
                    layers.forEach(layer => {
                        document.getElementById('layer-' + layer).style.opacity = '1';
                        document.getElementById('layer-' + layer).style.display = 'inline';
                    });
                } else {
                    svgElement.classList.remove('mode-all');
                    layers.forEach(layer => {
                        const el = document.getElementById('layer-' + layer);
                        if(layer === selectedLayer) {
                            el.style.display = 'inline';
                            setTimeout(() => el.style.opacity = '1', 50); 
                        } else {
                            el.style.opacity = '0';
                            setTimeout(() => el.style.display = 'none', 300); 
                        }
                    });
                }

                updateLegend(selectedLayer);
            }
        });

        function updateLegend(mode) {
            legendContainer.style.opacity = '0';
            setTimeout(() => {
                legendContainer.innerHTML = legends[mode];
                legendContainer.style.opacity = '1';
            }, 200);
        }
    </script>
