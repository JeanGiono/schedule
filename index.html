<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北歐奶茶風 旗艦綜合平面圖 - 名人世界專屬</title>
    <style>
        :root {
            /* 空間與材質色彩 (北歐奶茶風) */
            --bg-color: #fcfbf9;
            --wall-color: #8c7f75;      /* 牆壁：奶茶灰棕 */
            --wet-wall: #706359;        /* 共用水牆加深標示 */
            --balcony-floor: #e3ddd5;   
            --floor-wood: #f8f4ef;      /* 燕麥奶白木地板 */
            --floor-tile: #f0ebe4;      /* 衛浴廚房磁磚 */
            
            /* 家具色彩 (奶茶/原木色系) */
            --furn-wood: #e3d1be;       /* 淺橡木 */
            --furn-wood-dark: #ccb7a1;  /* 焦糖奶茶色 */
            --furn-wood-light: #f0e2d1; /* 樺木色 (NORDEN) */
            --furn-sofa: #cfc7bd;       /* 燕麥灰 (KIVIK) */
            --furn-bed: #fdfcf9;        /* 奶油白寢具 */
            --furn-wardrobe: #d9cabd;   /* 奶茶色衣櫃 */
            --furn-bath: #ffffff;       
            --furn-kitchen: #e6dfd8;    
            
            /* MEP 機電管線標示色彩 */
            --mep-beam: #f1c40f;        /* 木作假樑範圍 (黃色半透明) */
            --mep-ac: #3498db;          /* 冷氣 (藍色) */
            --mep-fresh: #27ae60;       /* 新風機 (綠色) */
            
            /* 標註線與文字 */
            --dim-line: #b0a092;        
            --text-color: #5c5046;      
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: 26px;
            letter-spacing: 2px;
        }

        .header p {
            margin: 0;
            font-size: 14px;
            color: #8c7f75;
            line-height: 1.6;
        }

        .legend-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(180, 170, 160, 0.15);
            margin-bottom: 20px;
            max-width: 1200px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        .legend-box {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            border-radius: 3px;
        }

        .canvas-container {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(180, 170, 160, 0.15);
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
            overflow-x: auto;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .room-title {
            font-size: 32px;
            font-weight: bold;
            fill: rgba(140, 127, 117, 0.08);
            text-anchor: middle;
            dominant-baseline: middle;
            letter-spacing: 8px;
        }

        .furn-label {
            font-size: 14px;
            font-weight: 600;
            fill: #ffffff;
            text-anchor: middle;
            dominant-baseline: middle;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(100, 90, 80, 0.3);
        }

        .furn-label-dark {
            font-size: 14px;
            font-weight: 600;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: middle;
            letter-spacing: 1px;
        }

        .dim-text {
            font-size: 18px;
            font-weight: bold;
            fill: var(--dim-line);
            text-anchor: middle;
            dominant-baseline: middle;
            letter-spacing: 1px;
        }

        .small-label {
            font-size: 12px;
            fill: var(--text-color);
            text-anchor: middle;
            dominant-baseline: middle;
            font-weight: bold;
        }
        
        .mep-label {
            font-size: 11px;
            font-weight: bold;
            fill: #d35400;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>北歐奶茶風 旗艦綜合平面圖 (Master Plan)</h1>
        <p>名人世界 15.86 坪物件最適解 ｜ 1:1 家具實體化 × 共用水牆工法 × 機電包管路徑</p>
    </div>

    <!-- 圖例說明 -->
    <div class="legend-container">
        <div class="legend-item"><div class="legend-box" style="background: url(#concrete-pattern); border: 1px solid var(--wall-color);"></div>15cm 廚衛共用水牆 (濕式輕隔間)</div>
        <div class="legend-item"><div class="legend-box" style="background: var(--mep-beam); opacity: 0.3; border: 1px dashed #d35400;"></div>H=2.6m 天花板假樑 (藏冷氣/新風管線)</div>
        <div class="legend-item"><div class="legend-box" style="background: none; border: 2px dashed var(--mep-ac);"></div>1對1 冷氣室內/外機</div>
        <div class="legend-item"><div class="legend-box" style="background: none; border: 2px dashed var(--mep-fresh);"></div>正壓新風主機</div>
        <div class="legend-item"><div class="legend-box" style="background: var(--furn-sofa);"></div>實體化家具 (KIVIK / NORDEN / Queen Bed)</div>
    </div>

    <div class="canvas-container">
        <!-- SVG 畫布 1px = 1cm -->
        <svg viewBox="-80 -80 1350 600" xmlns="http://www.w3.org/2000/svg">
            
            <defs>
                <!-- 箭頭標記 -->
                <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
                    <path d="M9,0 L0,3 L9,6 z" fill="var(--dim-line)" />
                </marker>
                <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <path d="M0,0 L9,3 L0,6 z" fill="var(--dim-line)" />
                </marker>

                <!-- 紋理材質 -->
                <pattern id="wood-floor" width="40" height="120" patternUnits="userSpaceOnUse">
                    <rect width="40" height="120" fill="var(--floor-wood)"/>
                    <line x1="0" y1="0" x2="0" y2="120" stroke="#ede5db" stroke-width="1"/>
                    <line x1="0" y1="60" x2="40" y2="60" stroke="#ede5db" stroke-width="1"/>
                </pattern>
                
                <pattern id="tile-floor" width="40" height="40" patternUnits="userSpaceOnUse">
                    <rect width="40" height="40" fill="var(--floor-tile)"/>
                    <rect width="40" height="40" fill="none" stroke="#e0d7cd" stroke-width="1"/>
                </pattern>

                <pattern id="balcony-hatch" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                    <rect width="20" height="20" fill="var(--balcony-floor)"/>
                    <line x1="0" y1="0" x2="0" y2="20" stroke="#d4cdc2" stroke-width="1"/>
                </pattern>

                <pattern id="concrete-pattern" width="10" height="10" patternUnits="userSpaceOnUse">
                    <rect width="10" height="10" fill="var(--wet-wall)" />
                    <circle cx="3" cy="3" r="1" fill="#a09388" />
                    <circle cx="7" cy="7" r="1.5" fill="#5c5046" />
                </pattern>
            </defs>

            <!-- ================= 背景與區域劃分 ================= -->
            <!-- 陽台區 (0.94m 寬) -->
            <polygon points="0,40 40,0 94,0 94,400 40,400 0,360" fill="url(#balcony-hatch)" />
            
            <!-- 主臥室 (3m 寬) -->
            <rect x="94" y="0" width="300" height="400" fill="url(#wood-floor)" />
            
            <!-- 客餐廳 (4.86m 寬) -->
            <rect x="394" y="0" width="486" height="400" fill="url(#wood-floor)" />
            
            <!-- 衛浴 (2.3m寬 x 1.5m深) -->
            <rect x="880" y="0" width="230" height="150" fill="url(#tile-floor)" />

            <!-- 廚房與玄關 (2.3m寬 x 2.35m深，扣除15cm共用水牆) -->
            <rect x="880" y="165" width="230" height="235" fill="url(#tile-floor)" />

            <!-- 空間浮水印 -->
            <text x="244" y="200" class="room-title">主臥室</text>
            <text x="637" y="200" class="room-title">客餐廳</text>


            <!-- ================= 隱藏式機電天花板 (MEP Overlay) ================= -->
            <!-- H=2.6m 木作假樑 (藏全室管線) -->
            <g opacity="0.3">
                <rect x="94" y="0" width="784" height="40" fill="var(--mep-beam)" stroke="#d35400" stroke-width="2" stroke-dasharray="5,5" />
                <rect x="354" y="40" width="40" height="110" fill="var(--mep-beam)" stroke="#d35400" stroke-width="2" stroke-dasharray="5,5" />
            </g>
            <text x="244" y="20" class="mep-label">H=2.6m 木作假樑 (藏冷熱水/冷媒/新風管)</text>
            <text x="374" y="95" class="mep-label" transform="rotate(90, 374, 95)">假樑延伸</text>


            <!-- ================= 建築牆體結構 ================= -->
            
            <g fill="var(--wall-color)">
                <!-- 左側陽台分隔牆 -->
                <rect x="90" y="0" width="4" height="400" />
                <!-- 主臥與客廳虛線分隔 -->
                <line x1="394" y1="0" x2="394" y2="400" stroke="var(--wall-color)" stroke-width="3" stroke-dasharray="10,10" />
                <!-- 客廳與衛廚分隔牆 (左牆) -->
                <rect x="878" y="0" width="4" height="80" /> <!-- 預留衛浴門洞 80~150 -->
                <rect x="878" y="150" width="4" height="250" />
                <!-- 建築外圍主牆 -->
                <rect x="94" y="-4" width="1020" height="4" />
                <rect x="94" y="400" width="926" height="4" /> <!-- 預留大門 1020~1110 -->
                <rect x="1110" y="0" width="4" height="310" /> <!-- 預留大門開門空間 -->
            </g>

            <!-- 🌟 重點：15cm 廚衛共用水牆 (Wet Wall) -->
            <!-- 位於 y=150 到 y=165，長度 x=882 到 x=1110 -->
            <rect x="882" y="150" width="228" height="15" fill="url(#concrete-pattern)" stroke="var(--wall-color)" stroke-width="1.5" />
            <text x="996" y="158" class="furn-label" style="font-size: 10px; fill: #fff; letter-spacing: 2px;">15cm 共用水牆 (內藏排水與給水管)</text>


            <!-- ================= 家具與重點設備 (1:1 實體化) ================= -->
            
            <!-- 【陽台區】 -->
            <!-- 洗衣機 -->
            <rect x="15" y="280" width="65" height="70" fill="#f0ebe6" stroke="#c4bdb6" stroke-width="2" rx="4" />
            <circle cx="47.5" cy="315" r="20" fill="#d4cec8" />
            <text x="47.5" y="365" class="small-label" style="font-size:11px;">洗衣機</text>
            
            <!-- 新風機主機 (天花板吊掛示意) -->
            <rect x="15" y="20" width="60" height="40" fill="none" stroke="var(--mep-fresh)" stroke-width="2" stroke-dasharray="4,2" rx="3" />
            <text x="45" y="40" class="mep-label" style="fill: var(--mep-fresh);" transform="rotate(90, 45, 40)">新風機</text>
            
            <!-- 冷氣室外機 (上下疊放示意) -->
            <rect x="15" y="190" width="60" height="70" fill="none" stroke="var(--mep-ac)" stroke-width="2" stroke-dasharray="4,2" rx="3" />
            <text x="45" y="225" class="mep-label" style="fill: var(--mep-ac);" transform="rotate(90, 45, 225)">疊放室外機</text>


            <!-- 【主臥室】 -->
            <!-- 1對1冷氣室內機 -->
            <rect x="180" y="0" width="90" height="20" fill="none" stroke="var(--mep-ac)" stroke-width="2" rx="2" />
            <text x="225" y="10" class="mep-label" style="fill: var(--mep-ac);">主臥冷氣</text>

            <!-- 化妝台 -->
            <rect x="94" y="0" width="60" height="45" fill="var(--furn-wood)" />
            <circle cx="124" cy="65" r="15" fill="var(--furn-wood-dark)" />
            <text x="124" y="22" class="small-label" fill="#fff">化妝台</text>

            <!-- Queen Size 床組 (160x200cm) + 上櫃 (160x45cm) -->
            <rect x="154" y="0" width="160" height="45" fill="var(--furn-wood-dark)" />
            <line x1="154" y1="0" x2="314" y2="45" stroke="#bda38b" stroke-width="1" />
            <line x1="314" y1="0" x2="154" y2="45" stroke="#bda38b" stroke-width="1" />
            <text x="234" y="22" class="furn-label">床頭上櫃</text>

            <rect x="154" y="45" width="160" height="200" fill="#ede2d5" rx="4" />
            <rect x="154" y="80" width="160" height="165" fill="var(--furn-bed)" rx="4" />
            <path d="M 154 90 Q 234 110 314 90" fill="none" stroke="#e3d6c8" stroke-width="2" />
            <rect x="170" y="55" width="55" height="32" fill="#ffffff" rx="5" />
            <rect x="245" y="55" width="55" height="32" fill="#ffffff" rx="5" />
            <text x="234" y="150" class="furn-label-dark" style="opacity: 0.4;">Queen Size 雙人床</text>

            <!-- 系統衣櫃 -->
            <rect x="94" y="330" width="290" height="70" fill="var(--furn-wardrobe)" />
            <rect x="100" y="335" width="135" height="60" fill="none" stroke="#f4ede6" stroke-width="2" />
            <rect x="240" y="335" width="135" height="60" fill="none" stroke="#f4ede6" stroke-width="2" />
            <text x="239" y="365" class="furn-label">系統衣櫃</text>


            <!-- 【客餐廳】 -->
            <!-- 大噸數冷氣室內機 (隔間牆上) -->
            <rect x="364" y="50" width="20" height="100" fill="none" stroke="var(--mep-ac)" stroke-width="2" rx="2" />
            <text x="374" y="100" class="mep-label" style="fill: var(--mep-ac);" transform="rotate(90, 374, 100)">客廳冷氣</text>

            <!-- 沙發背櫃 -->
            <rect x="405" y="0" width="225" height="30" fill="var(--furn-wood-dark)" />
            <text x="517" y="15" class="furn-label">沙發背櫃</text>

            <!-- IKEA KIVIK 沙發床 (225x90cm) -->
            <rect x="405" y="30" width="225" height="144" fill="none" stroke="var(--furn-sofa)" stroke-width="2" stroke-dasharray="8,5" opacity="0.8" />
            <rect x="405" y="30" width="225" height="90" fill="var(--furn-sofa)" rx="5" />
            <rect x="405" y="30" width="225" height="15" fill="#b8b0a6" rx="5" />
            <rect x="405" y="45" width="20" height="75" fill="#c2b9af" rx="3" />
            <rect x="610" y="45" width="20" height="75" fill="#c2b9af" rx="3" />
            <line x1="473" y1="45" x2="473" y2="120" stroke="#b8b0a6" stroke-width="2" />
            <line x1="541" y1="45" x2="541" y2="120" stroke="#b8b0a6" stroke-width="2" />
            <text x="517" y="155" class="furn-label-dark" style="opacity: 0.5;">KIVIK 展開範圍</text>

            <!-- 極簡茶几 -->
            <circle cx="517" cy="205" r="28" fill="#fcfaf7" stroke="#e0d5c8" stroke-width="2" />

            <!-- IKEA NORDEN 半折疊桌 (89x80cm) -->
            <g transform="translate(670, 20)">
                <rect x="0" y="0" width="63" height="80" fill="var(--furn-wood-light)" />
                <line x1="63" y1="0" x2="63" y2="80" stroke="#d4c6b5" stroke-width="1.5" />
                <rect x="63" y="0" width="26" height="80" fill="var(--furn-wood)" />
                <line x1="89" y1="0" x2="89" y2="80" stroke="#bda38b" stroke-width="2" />
                <text x="44" y="40" class="furn-label-dark" style="font-size: 11px;">NORDEN桌</text>
            </g>
            <!-- 餐椅 -->
            <rect x="630" y="42" width="30" height="35" fill="var(--furn-sofa)" rx="5" />
            <rect x="770" y="42" width="30" height="35" fill="var(--furn-sofa)" rx="5" />

            <!-- 下方收納列 -->
            <rect x="400" y="360" width="45" height="40" fill="var(--furn-wood)" />
            <text x="422" y="380" class="furn-label" style="font-size:12px;">書櫃</text>

            <rect x="445" y="360" width="180" height="40" fill="var(--furn-wood)" />
            <line x1="505" y1="360" x2="505" y2="400" stroke="#bda38b" stroke-width="1" />
            <line x1="565" y1="360" x2="565" y2="400" stroke="#bda38b" stroke-width="1" />
            <text x="535" y="340" class="furn-label-dark">電視櫃 (對齊沙發)</text>

            <rect x="820" y="340" width="60" height="60" fill="#edeae5" stroke="#c4bdb6" />
            <text x="850" y="370" class="small-label">冰箱 REF</text>


            <!-- 【衛浴空間 (上方 2.3m x 1.5m)】 -->
            <!-- 100cm 半高矮牆隔斷 -->
            <rect x="1030" y="0" width="80" height="150" fill="#f0f3f5" />
            <rect x="1024" y="0" width="12" height="100" fill="#f0ebe4" stroke="#c4bdb6" stroke-width="2" rx="2" />
            <text x="1030" y="50" class="tiny-label" fill="#8c7f75" transform="rotate(90, 1030, 50)" style="letter-spacing: 2px;">半高矮牆</text>
            <circle cx="1070" cy="75" r="12" stroke="#bbb" fill="none" />
            <circle cx="1070" cy="75" r="2" fill="#bbb" />

            <!-- 馬桶與洗手台 (靠左牆) -->
            <rect x="890" y="0" width="30" height="15" fill="var(--furn-bath)" stroke="#dcd6d0" rx="3" />
            <ellipse cx="905" cy="30" rx="15" ry="22" fill="var(--furn-bath)" stroke="#dcd6d0" />
            <text x="905" y="65" class="small-label">馬桶</text>

            <rect x="940" y="0" width="70" height="50" fill="#fcfaf7" stroke="#e0d7cd"/>
            <ellipse cx="975" cy="25" rx="20" ry="12" fill="var(--furn-bath)" stroke="#dcd6d0" />
            <circle cx="975" cy="10" r="3" fill="#a89d93" />
            <text x="975" y="65" class="small-label">洗手台</text>


            <!-- 【廚房與玄關 (下方 2.3m x 2.35m)】 -->
            <!-- 廚房流理台 (緊貼 15cm 共用水牆) -->
            <rect x="940" y="165" width="170" height="60" fill="var(--furn-kitchen)" />
            <!-- 水槽 -->
            <rect x="950" y="170" width="70" height="50" fill="#f5f2ed" rx="3" />
            <rect x="955" y="175" width="30" height="40" fill="#e8e5e0" rx="2" />
            <rect x="985" y="175" width="30" height="40" fill="#dfdbd5" rx="2" />
            <text x="985" y="240" class="small-label">雙口水槽</text>
            <!-- 瓦斯爐/IH爐 -->
            <rect x="1040" y="170" width="60" height="50" fill="#fcfaf7" rx="2" />
            <circle cx="1055" cy="195" r="10" fill="none" stroke="#a89d93" stroke-width="2" />
            <circle cx="1085" cy="195" r="10" fill="none" stroke="#a89d93" stroke-width="2" />
            <text x="1070" y="240" class="small-label">IH爐</text>

            <!-- 玄關收納 -->
            <rect x="880" y="360" width="70" height="40" fill="var(--furn-wood-dark)" />
            <text x="915" y="380" class="furn-label" style="font-size:12px;">家電櫃</text>
            <rect x="950" y="360" width="70" height="40" fill="var(--furn-wood)" />
            <text x="985" y="372" class="tiny-label">鞋櫃(下)</text>
            <text x="985" y="388" class="tiny-label">掛衣桿(上)</text>


            <!-- ================= 門片與開門軌跡 ================= -->
            <g fill="none" stroke="#bea99a" stroke-width="2">
                <!-- 衛浴門 (開在左牆靠下，往內推平貼南牆) -->
                <path d="M 880 80 A 70 70 0 0 1 950 150" stroke-dasharray="5,5" />
                <line x1="880" y1="150" x2="950" y2="150" stroke-width="4" stroke-linecap="round" />

                <!-- 大門入口 (鉸鏈在 1110, y=400，向內往上推) -->
                <path d="M 1020 400 A 90 90 0 0 1 1110 310" stroke-dasharray="5,5" />
                <line x1="1110" y1="400" x2="1110" y2="310" stroke-width="4" stroke-linecap="round" />
                <text x="1065" y="370" class="small-label" style="opacity: 0.5;">大門動線</text>
            </g>


            <!-- ================= 外部精準尺寸標註 ================= -->
            <g stroke="var(--dim-line)" stroke-width="2">
                <!-- 頂部尺寸線 -->
                <line x1="94" y1="-30" x2="394" y2="-30" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
                <text x="244" y="-45" class="dim-text" stroke="none">3m (主臥)</text>
                
                <line x1="394" y1="-30" x2="880" y2="-30" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
                <text x="637" y="-45" class="dim-text" stroke="none">4.86m (客廳)</text>
