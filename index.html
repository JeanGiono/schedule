<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #fcfbf9;
            --wall-color: #5c5046;
            --wet-wall: #8c7f75;
            --floor-wood: #f8f4ef;
            --floor-tile: #f0ebe4;
            --orig-beam: #a09388;
            
            --furn-wood: #e3d1be;
            --furn-wood-dark: #ccb7a1;
            --furn-sofa: #dfd5c9; 
            --furn-bed: #fdfcf9;
            --furn-wardrobe: #d9cabd;
            --tv-screen: #222222;
            --tv-frame: #111111;

            --mep-beam: #f1c40f;
            --mep-ac: #3498db;
            --mep-fresh: #27ae60;
            --pipe-cold: #0984e3;
            --pipe-hot: #d63031;
            --pipe-drain: #00b894;
            --pipe-acd: #00cec9;
            --color-airflow: #8e44ad;
            --color-exhaust: #c0392b;

            --elec-socket: #e74c3c;    
            --elec-switch: #f39c12;    
            --elec-network: #8e44ad;   
            --elec-water: #00cec9;     
            --elec-panel: #c0392b;     
            --elec-led: #f1c40f;       /* 新增：LED 線燈顏色 */

            --ceil-28: #ffffff;
            --ceil-26: #d8c8b8;
            --ceil-24: #e3dcd5;
            
            --primary: #8c7f75;
            --text-main: #332b24;
        }

        body {
            margin: 0; padding: 20px; background-color: #e5dfd8;
            font-family: 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 20px; color: var(--text-main); }
        .header h1 { margin: 0 0 5px 0; font-size: 26px; letter-spacing: 2px; }

        .tabs-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 1200px; }
        .tab-btn { background-color: #fff; color: var(--primary); border: 2px solid var(--primary); padding: 8px 16px; border-radius: 30px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn:hover { background-color: #f4ede6; }
        .tab-btn.active { background-color: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(140, 127, 117, 0.4); }
        .tab-btn[data-layer="electrical"] { border-color: #e74c3c; color: #e74c3c; }
        .tab-btn[data-layer="electrical"].active { background-color: #e74c3c; color: #fff; }

        .legend-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; background: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; max-width: 1200px; min-height: 24px; transition: opacity 0.3s ease; }
        .legend-item { display: flex; align-items: center; font-size: 13px; font-weight: 600; color: #444; }
        .legend-box { width: 18px; height: 18px; margin-right: 8px; border-radius: 3px; border: 1px solid #ddd; }
        .legend-icon { width: 20px; height: 20px; margin-right: 8px; display: flex; justify-content: center; align-items: center; }

        .canvas-container { background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 40px rgba(180, 170, 160, 0.15); width: 100%; max-width: 1200px; box-sizing: border-box; overflow-x: auto; }
        svg { width: 100%; height: auto; display: block; }

        /* 絕對零重疊 CAD 藍圖樣式 */
        .dim-text { font-size: 15px; font-weight: bold; fill: #a39486; text-anchor: middle; dominant-baseline: middle; }
        .leader-line { fill: none; stroke: #b0a092; stroke-width: 1.2; stroke-dasharray: 4, 4; opacity: 0.85; }
        .label-text { font-size: 13px; font-weight: bold; dominant-baseline: middle; }
        
        g[id^="layer-"] { transition: opacity 0.3s ease; }
        @keyframes dash { to { stroke-dashoffset: -20; } }
        .flow-line { stroke-dasharray: 8 6; animation: dash 1.5s linear infinite; }

        /* "綜合全圖" 透明度與層次優化 */
        .mode-all #layer-ceiling .ceil-zone { fill-opacity: 0.08; stroke-opacity: 0.2; }
        .mode-all #layer-mep .pipe-line { opacity: 0.25; }
        .mode-all #layer-mep .flow-line { opacity: 0.8; }
        .mode-all #layer-furniture { opacity: 0.65; }
        .mode-all #layer-masonry .orig-beam { opacity: 0.15; }
    </style>
</head>

                <pattern id="wood-floor" width="40" height="120" patternUnits="userSpaceOnUse"><rect width="40" height="120" fill="var(--floor-wood)"/><line x1="0" y1="0" x2="0" y2="120" stroke="#ede5db" stroke-width="1"/><line x1="0" y1="60" x2="40" y2="60" stroke="#ede5db" stroke-width="1"/></pattern>

                if(selectedLayer === 'all') {

                    });
